<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- FPGA Core -->
  <rect x="200" y="100" width="400" height="300" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="3"/>
  <text x="400" y="130" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">FPGA Logic (50 MHz)</text>
  
  <!-- Modules -->
  <rect x="230" y="150" width="150" height="60" rx="5" fill="#c3e6cb" stroke="#28a745" stroke-width="2"/>
  <text x="305" y="185" font-family="Arial" font-size="14" text-anchor="middle">Button Debouncer</text>

  <rect x="230" y="240" width="150" height="60" rx="5" fill="#c3e6cb" stroke="#28a745" stroke-width="2"/>
  <text x="305" y="275" font-family="Arial" font-size="14" text-anchor="middle">Button Mapper</text>

  <rect x="420" y="150" width="150" height="60" rx="5" fill="#b8daff" stroke="#007bff" stroke-width="2"/>
  <text x="495" y="185" font-family="Arial" font-size="14" text-anchor="middle">Servo Controller</text>

  <rect x="420" y="240" width="150" height="60" rx="5" fill="#ffeeba" stroke="#ffc107" stroke-width="2"/>
  <text x="495" y="275" font-family="Arial" font-size="14" text-anchor="middle">PWM Generators (4x)</text>

  <rect x="325" y="320" width="150" height="60" rx="5" fill="#f5c6cb" stroke="#dc3545" stroke-width="2"/>
  <text x="400" y="355" font-family="Arial" font-size="14" text-anchor="middle">Display Controller</text>

  <!-- External Inputs -->
  <rect x="20" y="180" width="120" height="80" rx="5" fill="#ffffff" stroke="#6c757d" stroke-width="2"/>
  <text x="80" y="225" font-family="Arial" font-size="16" text-anchor="middle">Buttons (4-12)</text>

  <!-- External Outputs -->
  <rect x="660" y="150" width="120" height="150" rx="5" fill="#ffffff" stroke="#6c757d" stroke-width="2"/>
  <text x="720" y="200" font-family="Arial" font-size="16" text-anchor="middle">Servo Motors</text>
  <text x="720" y="225" font-family="Arial" font-size="12" text-anchor="middle">1: Base</text>
  <text x="720" y="245" font-family="Arial" font-size="12" text-anchor="middle">2: Elbow</text>
  <text x="720" y="265" font-family="Arial" font-size="12" text-anchor="middle">3: Wrist</text>
  <text x="720" y="285" font-family="Arial" font-size="12" text-anchor="middle">4: Gripper</text>

  <rect x="660" y="330" width="120" height="60" rx="5" fill="#ffffff" stroke="#6c757d" stroke-width="2"/>
  <text x="720" y="365" font-family="Arial" font-size="16" text-anchor="middle">7-Seg Display</text>

  <!-- Arrows -->
  <!-- Buttons to Debouncer -->
  <line x1="140" y1="220" x2="220" y2="180" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Debouncer to Mapper -->
  <line x1="305" y1="210" x2="305" y2="230" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Mapper to Servo Controller -->
  <line x1="380" y1="270" x2="410" y2="180" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Servo Controller to PWM -->
  <line x1="495" y1="210" x2="495" y2="230" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Servo Controller to Display Controller -->
  <line x1="495" y1="210" x2="400" y2="310" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PWM to Servos -->
  <line x1="570" y1="270" x2="650" y2="225" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Display Controller to 7-Seg -->
  <line x1="475" y1="350" x2="650" y2="360" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057" />
    </marker>
  </defs>
</svg>
